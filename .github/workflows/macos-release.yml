name: macOS libmpv release

on:
  push:
    tags: ["v0.5.0"]
  workflow_dispatch:

permissions:
  contents: read

env:
  RELEASE_TAG: v0.5.0
  DMG_NAME: offline-video-caption-annotator_0.5.0_macos_aarch64.dmg
  SHA_NAME: offline-video-caption-annotator_0.5.0_macos_aarch64.dmg.sha256

jobs:
  build-macos:
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v0.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install isolated Rust toolchain
        run: npm run rust:setup

      - uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/offline-video-caption-annotator/libmpv-build/downloads
            ~/Library/Caches/offline-video-caption-annotator/libmpv-build/prefix
          key: macos-libmpv-${{ hashFiles('scripts/macos/libmpv-runtime.json', 'scripts/macos/build-libmpv.sh', 'scripts/macos/check-libmpv-dlopen.py', 'scripts/macos/patches/mpv-0.41.0-coreaudio-utils.patch') }}

      - name: Build pinned LGPL libmpv runtime
        run: |
          test -f scripts/macos/libmpv-runtime.json
          test -f scripts/macos/patches/mpv-0.41.0-coreaudio-utils.patch
          scripts/macos/build-libmpv.sh

      - name: Smoke-test synthetic AAC PCE audio
        run: |
          ffmpeg="$HOME/Library/Caches/offline-video-caption-annotator/libmpv-build/prefix/bin/ffmpeg"
          "$ffmpeg" -hide_banner -loglevel warning -y \
            -f lavfi -i 'sine=frequency=880:sample_rate=48000:duration=2' \
            -filter_complex '[0:a]pan=6.1|FL=c0|FR=c0|FC=c0|LFE=c0|BC=c0|SL=c0|SR=c0[a]' \
            -map '[a]' -c:a aac -aac_pce 1 -b:a 192k "$RUNNER_TEMP/aac-pce.mp4"
          MPV_SMOKE_AO=null scripts/macos/smoke-libmpv.sh "$RUNNER_TEMP/aac-pce.mp4"

      - name: Test frontend
        run: npm run test:run

      - name: Lint and typecheck frontend
        run: |
          npm run lint
          npm run typecheck
          npm run build

      - name: Test Rust core
        run: |
          ./scripts/with-rust.sh cargo test --manifest-path src-tauri/Cargo.toml
          ./scripts/with-rust.sh cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
          ./scripts/with-rust.sh cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Build macOS Apple Silicon bundles
        run: npm run tauri:build -- --config src-tauri/tauri.mpv-preview.conf.json

      - name: Verify and stage macOS assets
        shell: bash
        run: |
          set -euo pipefail

          app_path="src-tauri/target/release/bundle/macos/视频剧情标注.app"
          built_dmg_path="src-tauri/target/release/bundle/dmg/视频剧情标注_0.5.0_aarch64.dmg"
          binary_path="${app_path}/Contents/MacOS/offline-video-annotator"
          libmpv_path="${app_path}/Contents/Frameworks/libmpv.2.dylib"

          test -d "${app_path}"
          test -f "${built_dmg_path}"
          test -f "${app_path}/Contents/Resources/THIRD_PARTY_NOTICES.txt"
          test -f "${app_path}/Contents/Resources/libmpv-runtime.json"
          test -f "${app_path}/Contents/Resources/licenses/mpv-LGPL-2.1.txt"
          test -f "${app_path}/Contents/Resources/licenses/FFmpeg-LGPL-2.1.txt"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "${app_path}/Contents/Info.plist")" = "0.5.0"
          test "$(lipo -archs "${binary_path}")" = "arm64"
          test "$(lipo -archs "${libmpv_path}")" = "arm64"
          test "$(otool -D "${libmpv_path}" | tail -1)" = "@rpath/libmpv.2.dylib"
          ! nm -u "${libmpv_path}" | grep -E '_cfstr_(from|get)_cstr'
          scripts/macos/check-libmpv-dlopen.py "${libmpv_path}"
          otool -L "${libmpv_path}"
          ! otool -L "${libmpv_path}" | grep -E '/opt/homebrew|/usr/local'
          codesign --verify --deep --strict --verbose=2 "${app_path}"
          codesign -dv --verbose=4 "${app_path}" 2>&1 | grep -q "Signature=adhoc"
          hdiutil verify "${built_dmg_path}"

          mkdir -p release-assets
          cp "${built_dmg_path}" "release-assets/${DMG_NAME}"
          (
            cd release-assets
            shasum -a 256 "${DMG_NAME}" > "${SHA_NAME}"
          )

      - uses: actions/upload-artifact@v4
        with:
          name: offline-video-caption-annotator-0.5.0-macos-aarch64
          path: release-assets/*
          retention-days: 7
          compression-level: 0

  publish-macos:
    needs: build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: offline-video-caption-annotator-0.5.0-macos-aarch64
          path: release-assets

      - name: Publish macOS libmpv release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test -f "release-assets/${DMG_NAME}"
          test -f "release-assets/${SHA_NAME}"
          if ! gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" --generate-notes --title "视频剧情标注 ${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" || true
          fi
          gh release upload "${RELEASE_TAG}" \
            "release-assets/${DMG_NAME}" \
            "release-assets/${SHA_NAME}" \
            --clobber \
            --repo "${GITHUB_REPOSITORY}"
